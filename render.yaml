services:
  - type: web
    name: video-dubber
    runtime: docker
    plan: starter
    envVars:
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: VIMEO_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: VIMEO_FOLDER_ID
        sync: false
